server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        # Route to Auth Service
        - id: auth-service
          uri: http://localhost:8083
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        # Route to Inventory Service
        - id: inventory-service
          uri: http://localhost:8081
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=0

        # Route to Cart Service
        - id: cart-service
          uri: http://localhost:8082
          predicates:
            - Path=/cart/**
          filters:
            - StripPrefix=0


        - id: reel-service
          uri: http://localhost:8085
          predicates:
            - Path=/reels/**,/videos/**
          filters:
            - StripPrefix=0

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

app:
  jwt:
    secret: "JmOhT73SmmCi6kilzNi07YGh1ZAq3rBcbZV1CCiXzW0="

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always